name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! **Do not paste your Traeger password, `.env`, or `.bw_session` contents.**
        For a security vulnerability, use the private advisory tab instead (see below), not a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: Running `poll.py --watch 30` exits with ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `./venv/bin/python poll.py`
        2. ...
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste error output. **Redact any tokens, URLs with signatures, and device thing-names.**
      render: shell

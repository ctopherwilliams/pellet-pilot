name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"  # weekly Monday noon UTC

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Import smoke test
        # Catches breaking dependency bumps that pip-audit/bandit can't see
        # (they don't run the code). A bad major bump fails here, not at runtime.
        run: python -c "import traeger_client, poll, trend"

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Static analysis (bandit)
        run: bandit -c bandit.yaml -r poll.py traeger_client.py trend.py -ll

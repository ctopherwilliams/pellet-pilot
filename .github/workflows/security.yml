name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"  # weekly Monday noon UTC

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Smoke test
        # Exercises imports, status parsing, and paho MQTT client construction.
        # Catches breaking dependency bumps that pip-audit/bandit can't see
        # (they don't run the code). A bad major bump fails here, not at runtime.
        run: python tests/smoke.py

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Static analysis (bandit)
        run: bandit -c bandit.yaml -r . -ll

  # Stable check name for branch protection. Passes only if the whole matrix passed,
  # so the required status check does not change when the matrix does.
  audit:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "All test-matrix jobs passed."

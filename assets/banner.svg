<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pellet Pilot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1512"/>
      <stop offset="0.55" stop-color="#241a14"/>
      <stop offset="1" stop-color="#120d0a"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="0.45" stop-color="#ff8c1a"/>
      <stop offset="1" stop-color="#e8461e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a18" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="20" fill="url(#bg)"/>
  <ellipse cx="185" cy="160" rx="180" ry="180" fill="url(#glow)"/>

  <!-- flame mark -->
  <g transform="translate(120 78)">
    <path filter="url(#soft)" d="M66 8c14 26 4 40-6 54-8 11-10 22-2 33 12-6 18-18 19-31 12 12 21 27 21 45 0 34-27 57-59 57S-20 143 4 108c9-13 22-20 26-38 3-14-1-27-6-40 20 6 33 20 38 39 7-22 6-42-2-61 2 0 5 20 8 40z" fill="url(#ember)"/>
    <path d="M60 96c8 10 12 20 12 31 0 17-13 29-29 29-15 0-27-11-27-27 0-11 6-20 14-28-2 14 4 23 15 25-9-16-3-26 15-33-2 12 0 3 0 3z" fill="#fff3d6" opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-2" fill="#fff6e9">PELLET<tspan fill="url(#ember)"> PILOT</tspan></text>
  <text x="364" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#c9b8a8">Real-time telemetry &amp; cook analytics for WiFi pellet grills</text>

  <!-- chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">
    <rect x="364" y="228" width="176" height="40" rx="20" fill="#2b211a" stroke="#3d2e22"/>
    <text x="386" y="254" fill="#ffb454">🔥 live probe trends</text>
    <rect x="552" y="228" width="150" height="40" rx="20" fill="#2b211a" stroke="#3d2e22"/>
    <text x="574" y="254" fill="#ffb454">⏱ cook ETA</text>
    <rect x="714" y="228" width="168" height="40" rx="20" fill="#2b211a" stroke="#3d2e22"/>
    <text x="736" y="254" fill="#ffb454">🔔 temp alarms</text>
  </g>

  <text x="1240" y="300" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#6b5c4f">Unofficial · not affiliated with Traeger</text>
</svg>
